<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dr. Rahul Bodhi</title>
    <meta name="description" content="Contact information for Dr. Rahul Bodhi, Assistant Professor at IIM Sirmaur.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 2rem;
        }
        .contact-info-box {
            background-color: var(--bg-light);
            padding: 2rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }
        .contact-info-box h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .contact-detail {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .contact-icon {
            color: var(--accent-color);
            margin-top: 0.25rem;
            flex-shrink: 0;
        }
        .contact-form {
            background-color: var(--bg-light);
            padding: 2rem;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        .map-container {
            margin-top: 3rem;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
  
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Home</a></li>
				<li><a href="teaching.html" class="nav-link">Teaching</a></li>
                <li><a href="research.html" class="nav-link">Research</a></li>
				<li><a href="mdp.html" class="nav-link">MDPs</a></li>
				<li><a href="awards.html" class="nav-link">Awards</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--primary-color);">Contact</h1>
        <p style="color: var(--text-light); margin-bottom: 2rem;">
            I welcome inquiries from prospective students, collaborators, and industry. 
            The best way to reach me is via email.
        </p>
               
            </div>

            <div class="contact-form">
                <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Send a Message</h3>
                <form action="mailto:rahul.bodhi@iimsirmaur.ac.in" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required placeholder="Your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject *</label>
                        <input type="text" id="subject" name="subject" required placeholder="Purpose of your message">
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required placeholder="Your message..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
   </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Dr. Rahul Bodhi. All rights reserved.</p>
            <p>Last updated: January 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
